openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: admin
    description: Admin operations
  - name: operator
    description: Institution operator operations
  - name: student
    description: Student operations
  - name: books
    description: Book catalog operations
  - name: digitization
    description: Digitization request operations

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - token
        - user

    UserInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, operator, student]
        institutionId:
          type: integer
          nullable: true
      required:
        - id
        - email
        - name
        - role

    Institution:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - isActive
        - createdAt
        - updatedAt

    CreateInstitutionRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
      required:
        - name

    UpdateInstitutionRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        isActive:
          type: boolean

    DashboardStats:
      type: object
      properties:
        totalInstitutions:
          type: integer
        totalStudents:
          type: integer
        totalOperators:
          type: integer
        activeReaders:
          type: integer
      required:
        - totalInstitutions
        - totalStudents
        - totalOperators
        - activeReaders

    CreateOperatorRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
        institutionId:
          type: integer
      required:
        - email
        - name
        - password
        - institutionId

    OperatorInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        institutionId:
          type: integer
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        institution:
          $ref: "#/components/schemas/Institution"
      required:
        - id
        - email
        - name
        - role

    CreateStudentRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        externalId:
          type: string
      required:
        - email
        - name

    BulkStudentRequest:
      type: object
      properties:
        csv:
          type: string
          description: CSV data with columns email,name,external_id
      required:
        - csv

    BulkResult:
      type: object
      properties:
        created:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
        - created
        - errors

    StudentInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        externalId:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - isActive

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
          nullable: true
        isbn:
          type: string
          nullable: true
        language:
          type: string
        level:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - language
        - isActive
        - createdAt
        - updatedAt

    CreateBookRequest:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        language:
          type: string
        level:
          type: string
        coverImageUrl:
          type: string
        description:
          type: string
      required:
        - title

    UpdateBookRequest:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        language:
          type: string
        level:
          type: string
        coverImageUrl:
          type: string
        description:
          type: string
        isActive:
          type: boolean

    BookAssignment:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        studentId:
          type: integer
        institutionId:
          type: integer
        assignedBy:
          type: integer
          nullable: true
        assignedAt:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
        book:
          $ref: "#/components/schemas/Book"
        institution:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
      required:
        - id
        - bookId
        - studentId
        - institutionId
        - assignedAt
        - isActive

    CreateAssignmentRequest:
      type: object
      properties:
        bookId:
          type: integer
        studentId:
          type: integer
        dueDate:
          type: string
          format: date-time
      required:
        - bookId
        - studentId

    BulkAssignmentRequest:
      type: object
      properties:
        bookId:
          type: integer
        studentIds:
          type: array
          items:
            type: integer
        dueDate:
          type: string
          format: date-time
      required:
        - bookId
        - studentIds

    BulkAssignmentResult:
      type: object
      properties:
        created:
          type: integer
        skipped:
          type: integer
      required:
        - created
        - skipped

    BulkUnassignRequest:
      type: object
      properties:
        assignmentIds:
          type: array
          items:
            type: integer
      required:
        - assignmentIds

    BulkUnassignResult:
      type: object
      properties:
        deactivated:
          type: integer
        requested:
          type: integer
      required:
        - deactivated
        - requested

    StudentTokenRequest:
      type: object
      properties:
        idToken:
          type: string
          description: OAuth ID token (Google) or access token (Microsoft)
        provider:
          type: string
          enum: [google, microsoft]
          description: OAuth provider
      required:
        - idToken
        - provider

    AdminActivity:
      type: object
      properties:
        recentAssignments:
          type: array
          items:
            $ref: "#/components/schemas/BookAssignment"
        recentProgress:
          type: array
          items:
            $ref: "#/components/schemas/ReadingProgress"
        recentUsers:
          type: array
          items:
            $ref: "#/components/schemas/UserInfo"
      required:
        - recentAssignments
        - recentProgress
        - recentUsers

    ReadingProgress:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        bookId:
          type: integer
        assignmentId:
          type: integer
          nullable: true
        pagesRead:
          type: integer
        totalPages:
          type: integer
          nullable: true
        completionPercent:
          type: integer
        lastReadAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        student:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
        book:
          type: object
          properties:
            id:
              type: integer
            title:
              type: string
            author:
              type: string
              nullable: true
      required:
        - id
        - studentId
        - bookId
        - pagesRead
        - completionPercent
        - startedAt
        - createdAt
        - updatedAt

    DigitizationRequest:
      type: object
      properties:
        id:
          type: integer
        institutionId:
          type: integer
        requestedBy:
          type: integer
        bookTitle:
          type: string
        bookAuthor:
          type: string
          nullable: true
        bookIsbn:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed, rejected]
        notes:
          type: string
          nullable: true
        adminNotes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        institution:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        requester:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
      required:
        - id
        - institutionId
        - requestedBy
        - bookTitle
        - status
        - createdAt
        - updatedAt

    CreateDigitizationRequest:
      type: object
      properties:
        bookTitle:
          type: string
        bookAuthor:
          type: string
        bookIsbn:
          type: string
        notes:
          type: string
      required:
        - bookTitle

    UpdateDigitizationRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, rejected]
        adminNotes:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/student-token:
    post:
      operationId: studentTokenExchange
      tags: [auth]
      summary: Exchange OAuth credentials for a student JWT token
      description: Creates or finds a student user by email and returns a JWT token. Used after OAuth login to bridge into the dashboard auth system.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentTokenRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get global dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/institutions:
    get:
      operationId: listInstitutions
      tags: [admin]
      summary: List all institutions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of institutions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Institution"
    post:
      operationId: createInstitution
      tags: [admin]
      summary: Create a new institution
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInstitutionRequest"
      responses:
        "201":
          description: Institution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Institution"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/institutions/{id}:
    get:
      operationId: getInstitution
      tags: [admin]
      summary: Get institution by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Institution details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Institution"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateInstitution
      tags: [admin]
      summary: Update an institution
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInstitutionRequest"
      responses:
        "200":
          description: Institution updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Institution"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteInstitution
      tags: [admin]
      summary: Delete an institution
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Institution deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/operators:
    get:
      operationId: listOperators
      tags: [admin]
      summary: List all operators
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of operators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OperatorInfo"
    post:
      operationId: createOperator
      tags: [admin]
      summary: Create an operator account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperatorRequest"
      responses:
        "201":
          description: Operator created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/activity:
    get:
      operationId: getAdminActivity
      tags: [admin]
      summary: View all recent activity across the platform
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
          description: Maximum number of items per category (max 200)
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActivity"

  /operator/students:
    get:
      operationId: listStudents
      tags: [operator]
      summary: List students in operator's institution
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentInfo"
    post:
      operationId: registerStudent
      tags: [operator]
      summary: Register a student
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Student registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentInfo"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /operator/students/bulk:
    post:
      operationId: bulkRegisterStudents
      tags: [operator]
      summary: Bulk register students via CSV
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkStudentRequest"
      responses:
        "200":
          description: Bulk registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResult"

  /operator/assignments:
    post:
      operationId: createAssignment
      tags: [operator]
      summary: Assign a book to a student
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookAssignment"

  /operator/assignments/bulk:
    post:
      operationId: bulkCreateAssignments
      tags: [operator]
      summary: Assign a book to multiple students
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAssignmentRequest"
      responses:
        "201":
          description: Bulk assignment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAssignmentResult"

  /operator/assignments/{id}:
    delete:
      operationId: deleteAssignment
      tags: [operator]
      summary: Deactivate a book assignment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /operator/assignments/bulk-unassign:
    post:
      operationId: bulkUnassignBooks
      tags: [operator]
      summary: Bulk deactivate book assignments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUnassignRequest"
      responses:
        "200":
          description: Bulk unassign result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUnassignResult"

  /operator/progress:
    get:
      operationId: getReadingProgress
      tags: [operator]
      summary: Get reading progress for students
      security:
        - bearerAuth: []
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by student ID
      responses:
        "200":
          description: Reading progress list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadingProgress"

  /student/books:
    get:
      operationId: getStudentBooks
      tags: [student]
      summary: Get books assigned to the logged-in student
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of assigned books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookAssignment"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all active books
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      summary: Add a book to the catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequest"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get book by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateBook
      tags: [books]
      summary: Update a book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookRequest"
      responses:
        "200":
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /digitization-requests:
    get:
      operationId: listDigitizationRequests
      tags: [digitization]
      summary: List digitization requests
      security:
